<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech Synthesis</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="voiceinator">

      <h1>The Voiceinator 5000</h1>

      <select name="voice" id="voices">
        <option value="">Select A Voice</option>
      </select>

      <label for="rate">Rate:</label>
      <input name="rate" id="rate" type="range" min="0" max="3" value="1" step="0.1">

      <label for="pitch">Pitch:</label>

      <input name="pitch" id="pitch" type="range" min="0" max="2" step="0.1">
      <textarea name="text" id="text">Hello! I love JavaScript 👍</textarea>
      <button id="stop">Stop!</button>
      <button id="speak">Speak</button>

    </div>

<script>
  const msg = new SpeechSynthesisUtterance();
  let voices = [];
  const voicesDropdown = document.querySelector('[name="voice"]');
 const options = document.querySelectorAll('[type="range"], [name="text"]');
  const speakButton = document.querySelector('#speak');
  const stopButton = document.querySelector('#stop');

  //Your code goes here
	voices = speechSynthesis.getVoices();

	function populateVoices() {
    voices = speechSynthesis.getVoices();

    voicesDropdown.innerHTML = '<option value="">Select A Voice</option>';

    voices.forEach((voice) => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        voicesDropdown.appendChild(option);
    });
}

speechSynthesis.addEventListener("voiceschanged", populateVoices);
	

	const rate = document.getElementById("rate").value;
	const pitch = document.getElementById("pitch").value;
	const text = document.getElementById("text").value;
	const voice = voicesDropdown.value;

	
	speakButton.addEventListener("click",()=>{
		msg.text = text;
	msg.pitch= pitch;
	msg.rate = rate;
	
	const selectedVoice = voices.find(v => v.name === voicesDropdown.value);
	msg.voice = selectedVoice;
		speechSynthesis.speak(msg);
	});

	stopButton.addEventListener("click",()=>{
		

		speechSynthesis.cancel();
	})
	
</script>

</body>
</html>
